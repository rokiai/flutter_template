# Lightweight CI: resolve deps, codegen, and verify the app can start (compile smoke).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify startup
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare env
        run: cp .env.example .env

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation
        run: |
          dart run build_runner build --delete-conflicting-outputs
          flutter gen-l10n

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Unit tests
        run: flutter test

      # Compile smoke — proves main.dart and DI graph resolve for a real target.
      - name: Build web (startup smoke)
        run: flutter build web --dart-define=FLAVOR=dev
